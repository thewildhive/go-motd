name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'testdata/**'
      - 'LICENSE'
      - 'NOTICE'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.changed.outputs.go }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Detect changed paths
        id: changed
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.github/scripts/**'
              - '.github/workflows/ci.yml'

  go:
    name: Go checks
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go checks
        env:
          GOCACHE: /tmp/go-build-cache
        run: |
          set -euo pipefail
          UNFORMATTED="$(gofmt -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi
          go vet ./...
          go test -race -count=1 ./...
          go build -buildvcs=false -o /tmp/motd-test .
          /tmp/motd-test -h

  cross-platform:
    name: Cross-platform build
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64 }
          - { os: darwin, arch: amd64 }
          - { os: darwin, arch: arm64 }
          - { os: linux, arch: amd64 }
          - { os: linux, arch: arm64 }
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-platform build
        env:
          GOCACHE: /tmp/go-build-cache
        run: |
          set -euo pipefail
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build ./...

  windows-tests:
    name: Windows tests
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Windows tests
        run: go test -count=1 ./...

  required:
    name: Required checks
    if: always()
    needs:
      - changes
      - go
      - cross-platform
      - windows-tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ensure required checks passed
        run: |
          if [ "${{ needs.changes.result }}" = "failure" ] || [ "${{ needs.go.result }}" = "failure" ] || [ "${{ needs.cross-platform.result }}" = "failure" ] || [ "${{ needs.windows-tests.result }}" = "failure" ]; then
            echo "One or more required checks failed"
            exit 1
          fi
