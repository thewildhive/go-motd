name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild/upload assets for, for example v1.2.3
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message || '', 'chore(release)') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          set -euo pipefail
          UNFORMATTED="$(gofmt -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Run quality checks
        run: |
          set -euo pipefail
          go test ./...
          go vet ./...
          go build -buildvcs=false -o /tmp/motd-test .
          /tmp/motd-test -h

  release:
    name: Semantic Release
    needs: test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message || '', 'chore(release)') }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Capture latest tag before release
        id: pre_tag
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.tag == '' }}
        run: |
          set -euo pipefail
          TAG=""
          if TAG_CANDIDATE=$(git describe --tags --abbrev=0 2>/dev/null); then
            TAG="$TAG_CANDIDATE"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish with semantic-release
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.tag == '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release

      - name: Resolve release metadata
        id: release_meta
        run: |
          set -euo pipefail
          INPUT_TAG="${{ github.event.inputs.tag || '' }}"
          if [ -n "$INPUT_TAG" ]; then
            VERSION="${INPUT_TAG#v}"
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREV_TAG="${{ steps.pre_tag.outputs.tag }}"
          TAG=""
          if TAG_CANDIDATE=$(git describe --tags --abbrev=0 2>/dev/null); then
            TAG="$TAG_CANDIDATE"
          fi

          if [ -z "$TAG" ] || [ "$TAG" = "$PREV_TAG" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${TAG#v}"
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout requested release tag
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        run: |
          set -euo pipefail
          git checkout --detach "${{ steps.release_meta.outputs.tag }}"

      - name: Build release binaries
        if: steps.release_meta.outputs.released == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.release_meta.outputs.version }}"
          mkdir -p release

          GOOS=linux GOARCH=amd64 go build -buildvcs=false -ldflags="-s -w -X main.VERSION=${VERSION}" -o release/motd-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -buildvcs=false -ldflags="-s -w -X main.VERSION=${VERSION}" -o release/motd-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -buildvcs=false -ldflags="-s -w -X main.VERSION=${VERSION}" -o release/motd-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -buildvcs=false -ldflags="-s -w -X main.VERSION=${VERSION}" -o release/motd-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -buildvcs=false -ldflags="-s -w -X main.VERSION=${VERSION}" -o release/motd-windows-amd64.exe .

          cd release
          sha256sum motd-linux-amd64 motd-linux-arm64 motd-darwin-amd64 motd-darwin-arm64 motd-windows-amd64.exe > checksums.txt

      - name: Package release artifacts
        if: steps.release_meta.outputs.released == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.release_meta.outputs.version }}"
          cd release

          tar -czf "motd-${VERSION}-linux-amd64.tar.gz" motd-linux-amd64
          tar -czf "motd-${VERSION}-linux-arm64.tar.gz" motd-linux-arm64
          tar -czf "motd-${VERSION}-darwin-amd64.tar.gz" motd-darwin-amd64
          tar -czf "motd-${VERSION}-darwin-arm64.tar.gz" motd-darwin-arm64
          zip "motd-${VERSION}-windows-amd64.zip" motd-windows-amd64.exe
          sha256sum *.tar.gz *.zip > archive-checksums.txt

      - name: Upload release assets
        if: steps.release_meta.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          files: |
            release/*.tar.gz
            release/*.zip
            release/motd-linux-amd64
            release/motd-linux-arm64
            release/motd-darwin-amd64
            release/motd-darwin-arm64
            release/motd-windows-amd64.exe
            release/checksums.txt
            release/archive-checksums.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
