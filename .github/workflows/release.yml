name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'testdata/**'
      - 'LICENSE'
      - 'NOTICE'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild/upload assets for, for example v1.2.3
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name != 'workflow_dispatch' }}
    outputs:
      releasable: ${{ steps.changed.outputs.releasable }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect releasable changes
        id: changed
        run: |
          set -euo pipefail
          BASE=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGED=$(git diff --name-only "$BASE"..HEAD 2>/dev/null || true)
          CODE_CHANGED=$(echo "$CHANGED" | grep -vE '(^|/)docs/|(^|/)testdata/|(^|/)LICENSE$|(^|/)NOTICE$|(^|/)\.github/|\.md$' || true)
          if [ -z "$CODE_CHANGED" ]; then
            echo "releasable=false" >> "$GITHUB_OUTPUT"
            echo "No releasable code changes detected"
          else
            echo "releasable=true" >> "$GITHUB_OUTPUT"
            echo "Releasable changes detected"
          fi

  release:
    name: Release
    needs: changes
    if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.releasable == 'true') && (github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message || '', 'chore(release)')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate requested release tag
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        run: |
          set -euo pipefail
          if ! [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi
          git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null
          git checkout --detach "$RELEASE_TAG"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum

      - name: Install svu
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: go install github.com/caarlos0/svu/v2@v2.2.0

      - name: Verify formatting
        run: |
          set -euo pipefail
          UNFORMATTED="$(gofmt -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Run quality checks
        env:
          GOCACHE: /tmp/go-build-cache
        run: |
          set -euo pipefail
          go test -count=1 ./...
          go vet ./...
          go build -buildvcs=false -o /tmp/motd-test .
          /tmp/motd-test -h

      - name: Capture previous tag
        id: previous_tag
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.tag == '' }}
        run: |
          tag=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || true)
          printf 'value=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          echo "Previous tag: $tag"

      - name: Determine next version
        id: version
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.tag == '' }}
        run: |
          eval "$(bash .github/scripts/determine-version.sh)"
          if [ -z "$version" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "No release needed — no version-bumping commits since last tag."
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "tag=$version" >> "$GITHUB_OUTPUT"
            echo "version=${version#v}" >> "$GITHUB_OUTPUT"
            echo "Next version: $version"
          fi

      - name: Resolve manual release metadata
        id: manual_release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: ${{ steps.version.outputs.needed == 'true' }}
        run: |
          PREV="${{ steps.previous_tag.outputs.value }}"
          DATE=$(date -u +%Y-%m-%d)
          {
            printf '## [%s] - %s\n\n' "${{ steps.version.outputs.tag }}" "$DATE"
            if [ -n "$PREV" ]; then
              git log "$PREV"..HEAD --no-merges \
                --format='- %s (%h)' \
                --grep='^feat:\\|^fix:\\|^perf:\\|^refactor:\\|^build:\\|^docs:' \
                2>/dev/null || true
            else
              git log HEAD --no-merges \
                --format='- %s (%h)' \
                --grep='^feat:\\|^fix:\\|^perf:\\|^refactor:\\|^build:\\|^docs:' \
                2>/dev/null || true
            fi
            printf '\n'
          } > /tmp/release-notes.md

      - name: Build release binaries
        if: ${{ steps.version.outputs.needed == 'true' || steps.manual_release.outputs.released == 'true' }}
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version || steps.manual_release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release
          BUILDDATE=$(date -u +%d%m%y)
          LDFLAGS="-s -w -X main.VERSION=${RELEASE_VERSION} -X main.BUILDDATE=${BUILDDATE}"

          GOOS=linux GOARCH=amd64 go build -buildvcs=false -ldflags="${LDFLAGS}" -o release/motd-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -buildvcs=false -ldflags="${LDFLAGS}" -o release/motd-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -buildvcs=false -ldflags="${LDFLAGS}" -o release/motd-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -buildvcs=false -ldflags="${LDFLAGS}" -o release/motd-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -buildvcs=false -ldflags="${LDFLAGS}" -o release/motd-windows-amd64.exe .

          cd release
          sha256sum motd-linux-amd64 motd-linux-arm64 motd-darwin-amd64 motd-darwin-arm64 motd-windows-amd64.exe > checksums.txt

      - name: Sign checksums.txt
        if: ${{ steps.version.outputs.needed == 'true' || steps.manual_release.outputs.released == 'true' }}
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SIGNING_KEY" ]; then
            echo "SIGNING_PRIVATE_KEY secret is not set — skipping checksums signing"
            exit 1
          fi
          KEY_FILE=$(mktemp)
          chmod 600 "$KEY_FILE"
          printf '%s' "$SIGNING_KEY" > "$KEY_FILE"
          openssl pkeyutl -sign -inkey "$KEY_FILE" -rawin -in release/checksums.txt -out release/checksums.txt.sig
          rm -f "$KEY_FILE"

      - name: Package release artifacts
        if: ${{ steps.version.outputs.needed == 'true' || steps.manual_release.outputs.released == 'true' }}
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version || steps.manual_release.outputs.version }}
        run: |
          set -euo pipefail
          cd release

          tar -czf "motd-${RELEASE_VERSION}-linux-amd64.tar.gz" motd-linux-amd64
          tar -czf "motd-${RELEASE_VERSION}-linux-arm64.tar.gz" motd-linux-arm64
          tar -czf "motd-${RELEASE_VERSION}-darwin-amd64.tar.gz" motd-darwin-amd64
          tar -czf "motd-${RELEASE_VERSION}-darwin-arm64.tar.gz" motd-darwin-arm64
          zip "motd-${RELEASE_VERSION}-windows-amd64.zip" motd-windows-amd64.exe
          sha256sum *.tar.gz *.zip > archive-checksums.txt

      - name: Update CHANGELOG.md
        if: steps.version.outputs.needed == 'true'
        env:
          PREV_TAG: ${{ steps.previous_tag.outputs.value }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          {
            printf '## [%s] - %s\n\n' "${{ steps.version.outputs.tag }}" "$DATE"
            if [ -n "$PREV_TAG" ]; then
              git log "$PREV_TAG"..HEAD --no-merges \
                --format='- %s (%h)' \
                --grep='^feat:\\|^fix:\\|^perf:\\|^refactor:\\|^build:\\|^docs:' \
                2>/dev/null || true
            else
              git log HEAD --no-merges \
                --format='- %s (%h)' \
                --grep='^feat:\\|^fix:\\|^perf:\\|^refactor:\\|^build:\\|^docs:' \
                2>/dev/null || true
            fi
            printf '\n'
          } > /tmp/changelog-entry.md

          if [ -f CHANGELOG.md ]; then
            cat /tmp/changelog-entry.md CHANGELOG.md > /tmp/new-changelog.md
            mv /tmp/new-changelog.md CHANGELOG.md
          else
            {
              printf '# Changelog\n\n'
              cat /tmp/changelog-entry.md
            } > CHANGELOG.md
          fi

      - name: Commit CHANGELOG.md and push tag
        if: steps.version.outputs.needed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.version }}"
          git tag --force -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin --force "refs/tags/${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.version.outputs.needed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: /tmp/release-notes.md
          files: |
            release/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload rebuilt release assets
        if: ${{ github.event_name == 'workflow_dispatch' && steps.manual_release.outputs.released == 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.manual_release.outputs.tag }}
          files: |
            release/*.tar.gz
            release/*.zip
            release/motd-linux-amd64
            release/motd-linux-arm64
            release/motd-darwin-amd64
            release/motd-darwin-arm64
            release/motd-windows-amd64.exe
            release/checksums.txt
            release/checksums.txt.sig
            release/archive-checksums.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}